name: Build Tauri Mac App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: packages/tauri
        run: cargo tauri build
        env:
          CI: true
          REINS_BACKEND_URL: ${{ secrets.REINS_BACKEND_URL }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: REINS.dmg
          path: packages/tauri/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: REINS.app
          path: packages/tauri/src-tauri/target/release/bundle/macos/*.app

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/tauri/src-tauri/target/release/bundle/dmg/*.dmg
          draft: true
          generate_release_notes: true
