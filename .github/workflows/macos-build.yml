name: macOS Build

on:
  push:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project packages/macos/Reins.xcodeproj \
            -scheme Reins \
            -configuration Debug \
            -derivedDataPath build \
            build
