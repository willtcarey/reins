name: macOS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project packages/macos/Reins.xcodeproj \
            -scheme Reins \
            -configuration Release \
            SYMROOT=$(pwd)/packages/macos/dist \
            build
