<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#18181b"/>
  <!-- Monitor in profile - a thin rectangle viewed from the side -->
  <rect x="18" y="12" width="6" height="28" rx="2" fill="#a1a1aa"/>
  <!-- Slight screen bevel on the left face -->
  <line x1="18" y1="14" x2="18" y2="38" stroke="#71717a" stroke-width="1"/>
  <!-- Monitor stand - angled foot -->
  <line x1="21" y1="40" x2="21" y2="46" stroke="#a1a1aa" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="46" x2="28" y2="46" stroke="#a1a1aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Two reins flowing from the right side of the monitor, like held reins -->
  <path d="M24 18 Q36 16 42 22 Q50 30 46 42 Q44 48 40 52" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M24 24 Q34 23 40 28 Q48 36 45 46 Q43 51 42 54" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Rein ends / tassels -->
  <line x1="40" y1="52" x2="37" y2="55" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="41" y2="56" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="54" x2="40" y2="57" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="54" x2="44" y2="57" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
</svg>
